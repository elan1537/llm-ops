models:
  - name: qwen3.5-27b
    base_url: http://localhost:8000/v1
    model_id: Qwen/Qwen3.5-27B
    vision: true
judge:
  base_url: http://REDACTED_HOST:8317/v1
  model_id: claude-opus-4-6
  api_key: ${JUDGE_API_KEY}

datasets:
  mmlu:
    enabled: true
    samples: 200
    evaluator: exact_match
  kmmlu:
    enabled: true
    samples: 200
    evaluator: exact_match
  korquad:
    enabled: true
    samples: 200
    evaluator: f1_em
  xlsum_ko:
    enabled: true
    samples: 100
    evaluator: llm_judge
  gsm8k:
    enabled: true
    samples: 200
    evaluator: exact_match
  docvqa:
    enabled: true
    samples: 100
    evaluator: anls
    vision_only: true
    anls_judge_threshold: 0.5
  ocrbench:
    enabled: true
    samples: 100
    evaluator: anls
    vision_only: true
    anls_judge_threshold: 0.5
  pdf_ocr:
    enabled: true
    samples: 6
    evaluator: cer
    vision_only: true
    mode: synthetic
  figure_caption:
    enabled: true
    samples: 30
    evaluator: llm_judge
    vision_only: true
    judge_prompt: figure_caption
  longbench:
    enabled: true
    samples: 10
    evaluator: exact_match
    length: short
    max_context_chars: 200000
  ruler:
    enabled: true
    samples: 12
    evaluator: f1_em
    context_lengths: [4000, 16000, 64000, 128000]
    positions: [0.1, 0.5, 0.9]

settings:
  temperatures: [0.0, 0.5]
  stochastic_runs: 3
  concurrent_requests: 4
  timeout: 300
  max_tokens: 4096
  results_dir: benchmark/results
